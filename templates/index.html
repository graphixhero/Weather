<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Health Advisor</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: #333;
        }
        .card {
            border: none;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            background: rgba(255, 255, 255, 0.95);
        }
        .btn-search {
            background: linear-gradient(to right, #00c6ff, #0072ff);
            border: none;
            color: white;
            transition: all 0.3s ease;
        }
        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,114,255,0.4);
            color: white;
        }
        .weather-icon {
            font-size: 3rem;
            background: linear-gradient(to bottom, #ff9966, #ff5e62);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card p-4 p-md-5">
                    <h1 class="text-center mb-4 fw-bold text-primary">Health Weather</h1>
                    <div class="input-group mb-4 shadow-sm rounded-pill overflow-hidden">
                        <input type="text" id="cityInput" class="form-control border-0 ps-4" placeholder="Search city..." aria-label="City name">
                        <button class="btn btn-search px-4" type="button" id="searchBtn">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                    <div id="results" class="mt-2">
                        <!-- Results will appear here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.getElementById('searchBtn').addEventListener('click', async () => {
            const city = document.getElementById('cityInput').value;
            if (!city) return;

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="text-center my-4"><div class="spinner-grow text-primary" role="status"></div></div>';

            try {
                const response = await fetch(`/weather?city=${encodeURIComponent(city)}`);
                const data = await response.json();

                if (data.error) {
                    resultsDiv.innerHTML = `<div class="alert alert-danger rounded-4">${data.error}</div>`;
                } else {
                    const aqiColor = data.aqi > 100 ? 'text-danger' : (data.aqi > 50 ? 'text-warning' : 'text-success');
                    resultsDiv.innerHTML = `
                        <div class="text-center fade-in">
                            <h2 class="fw-bold mb-1">${data.city}</h2>
                            <p class="text-muted small mb-4">Current Conditions</p>
                            
                            <div class="d-flex align-items-center justify-content-center mb-4">
                                <i class="fas fa-sun weather-icon me-3"></i>
                                <div class="display-3 fw-bold">${Math.round(data.temperature)}°</div>
                            </div>

                            <div class="row g-3 mb-4">
                                <div class="col-4">
                                    <div class="p-3 rounded-4 bg-light">
                                        <i class="fas fa-droplet text-info mb-2"></i>
                                        <div class="small text-muted">Humidity</div>
                                        <div class="fw-bold">${data.humidity}%</div>
                                    </div>
                                </div>
                                <div class="col-4">
                                    <div class="p-3 rounded-4 bg-light">
                                        <i class="fas fa-wind text-secondary mb-2"></i>
                                        <div class="small text-muted">Wind</div>
                                        <div class="fw-bold">${Math.round(data.wind_speed)}<span class="small">km/h</span></div>
                                    </div>
                                </div>
                                <div class="col-4">
                                    <div class="p-3 rounded-4 bg-light">
                                        <i class="fas fa-mask-face ${aqiColor} mb-2"></i>
                                        <div class="small text-muted">AQI</div>
                                        <div class="fw-bold ${aqiColor}">${data.aqi}</div>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-4 p-3 rounded-4 bg-primary bg-opacity-10 text-start border-start border-4 border-primary">
                                <div class="d-flex align-items-center mb-2">
                                    <i class="fas fa-heart-pulse text-primary me-2"></i>
                                    <h6 class="fw-bold mb-0">Health Advice</h6>
                                </div>
                                <p class="mb-0 text-dark small">${data.advice}</p>
                            </div>
                        </div>
                    `;
                }
            } catch (err) {
                resultsDiv.innerHTML = `<div class="alert alert-danger rounded-4">Service unavailable. Please try again.</div>`;
            }
        });

        // Allow Enter key to trigger search
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('searchBtn').click();
        });
    </script>
</body>
</html>
